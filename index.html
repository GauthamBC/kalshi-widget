<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Kalshi Market Widget</title>

    <!-- Chart.js (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- ✅ REQUIRED for `scales.x.type = "time"` in Chart.js v4 -->
    <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0"></script>

    <style>
      :root {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        padding: 16px;
        background: #f7f7f8;
      }
      .card {
        max-width: 920px;
        margin: 0 auto;
        background: white;
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }
      .pill {
        padding: 6px 10px;
        border-radius: 999px;
        background: #eef2ff;
        color: #1e1b4b;
        font-size: 12px;
        font-weight: 600;
      }
      h2 {
        margin: 0 0 12px 0;
        font-size: 20px;
      }
      label {
        font-size: 12px;
        color: #333;
        display: block;
        margin-bottom: 6px;
      }
      input[type="text"] {
        flex: 1;
        min-width: 280px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #ddd;
        font-size: 14px;
        outline: none;
      }
      button {
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid #111;
        background: #111;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .muted {
        color: #666;
        font-size: 13px;
      }
      .error {
        color: #b91c1c;
        font-weight: 700;
        margin-top: 10px;
      }
      .sectionTitle {
        font-size: 14px;
        font-weight: 900;
        margin: 14px 0 10px;
      }
      .statsBar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 10px;
      }
      .statTile {
        background: linear-gradient(135deg, #0b0f1a, #111827);
        color: white;
        border-radius: 14px;
        padding: 14px 16px;
        position: relative;
        overflow: hidden;
      }
      .statLabel {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.7);
        letter-spacing: 0.08em;
      }
      .statValue {
        margin-top: 6px;
        font-size: 28px;
        font-weight: 900;
      }
      .legendRow {
        margin-top: 10px;
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        align-items: center;
        font-size: 13px;
        font-weight: 700;
      }
      .legendItem {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        display: inline-block;
      }
      .chartWrap {
        margin-top: 12px;
        background: #0b0f1a;
        border-radius: 14px;
        padding: 12px;
      }
      .chartMeta {
        margin-top: 6px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.7);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        font-size: 13px;
      }
      th,
      td {
        padding: 10px 8px;
        border-bottom: 1px solid #eee;
        text-align: left;
      }
      th {
        font-size: 12px;
        color: #555;
      }
      tr.clickable:hover td {
        background: #f3f4f6;
        cursor: pointer;
      }
      .topRow {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      select {
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid #ddd;
        font-size: 13px;
        background: white;
      }
      .countTag {
        font-size: 12px;
        color: #444;
        background: #f3f4f6;
        padding: 4px 8px;
        border-radius: 999px;
        font-weight: 700;
      }
      .debugBox {
        margin-top: 12px;
        padding: 10px;
        background: #0b0f1a;
        color: #e5e7eb;
        border-radius: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        max-height: 240px;
        overflow: auto;
        display: none;
      }
      .badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        background: #ecfeff;
        color: #155e75;
        font-size: 12px;
        font-weight: 800;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="row" style="justify-content: space-between">
        <div class="pill">Kalshi Widget (market + event + chart)</div>
        <div class="pill" id="statusPill">Idle</div>
      </div>

      <div style="margin-top: 14px">
        <h2 id="title">Enter a market ticker or event ticker</h2>
        <div class="row">
          <div style="flex: 1">
            <label for="tickerInput">Enter a market ticker or event ticker</label>
            <input
              id="tickerInput"
              type="text"
              placeholder="Example: KXBTC-24DEC31 or KXFEDCHAIRNOM-29"
              autocomplete="off"
            />
          </div>
          <button id="loadBtn">Load</button>
        </div>
        <div class="muted" id="meta"></div>
        <div class="error" id="error"></div>
      </div>

      <div class="sectionTitle" id="question" style="display: none"></div>

      <div class="statsBar" id="statsBar" style="display: none">
        <div class="statTile">
          <div class="statLabel">VOLUME (24H)</div>
          <div class="statValue" id="vol24h">—</div>
        </div>
        <div class="statTile">
          <div class="statLabel">OPEN INTEREST</div>
          <div class="statValue" id="openInt">—</div>
        </div>
      </div>

      <div class="legendRow" id="legendRow" style="display: none"></div>

      <div class="chartWrap" id="chartWrap" style="display: none">
        <canvas id="chartCanvas" height="240"></canvas>
        <div class="chartMeta" id="chartMeta"></div>
      </div>

      <div id="listWrap" style="display: none; margin-top: 14px">
        <div class="topRow">
          <div style="display: flex; align-items: center; gap: 10px">
            <div class="sectionTitle" id="listTitle" style="margin: 0">
              Markets
            </div>
            <span class="countTag" id="countTag">0 markets</span>
          </div>

          <div class="row">
            <select id="sortSelect">
              <option value="yes_bid_desc" selected>Sort: YES bid (high → low)</option>
              <option value="yes_bid_asc">Sort: YES bid (low → high)</option>
              <option value="volume_desc">Sort: Volume (high → low)</option>
            </select>
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Market</th>
              <th>YES (bid/ask)</th>
              <th>NO (bid/ask)</th>
              <th>Vol</th>
              <th>Ticker</th>
            </tr>
          </thead>
          <tbody id="marketsTbody"></tbody>
        </table>
      </div>

      <div class="debugBox" id="debugBox"></div>
    </div>

    <script>
      // ===========================
      // CONFIG
      // ===========================
      const BASE = "https://api.elections.kalshi.com/trade-api/v2";
      const DEBUG = false; // set true to show raw JSON

      // ===========================
      // DOM
      // ===========================
      const titleEl = document.getElementById("title");
      const statusPill = document.getElementById("statusPill");
      const inputBox = document.getElementById("tickerInput");
      const loadBtn = document.getElementById("loadBtn");
      const metaEl = document.getElementById("meta");
      const errEl = document.getElementById("error");
      const questionEl = document.getElementById("question");

      const statsBar = document.getElementById("statsBar");
      const vol24hEl = document.getElementById("vol24h");
      const openIntEl = document.getElementById("openInt");

      const legendRow = document.getElementById("legendRow");

      const chartWrap = document.getElementById("chartWrap");
      const chartCanvas = document.getElementById("chartCanvas");
      const chartMeta = document.getElementById("chartMeta");

      const listWrap = document.getElementById("listWrap");
      const listTitle = document.getElementById("listTitle");
      const countTag = document.getElementById("countTag");
      const sortSelect = document.getElementById("sortSelect");
      const marketsTbody = document.getElementById("marketsTbody");

      const debugBox = document.getElementById("debugBox");

      // ===========================
      // STATE
      // ===========================
      let chart = null;
      let activeMode = null; // "market" | "event"
      let activeMarketTicker = null;
      let lastEventMarkets = [];
      let activeRange = "1d";
      let activeEventTicker = null;
      let activeEventSection = null; // e.g., "Politics · Trump"
      let activeMarketTickersForChart = null;

      // map ticker -> display name for legend labels
      const tickerToName = new Map();

      // color palette for lines (fixed order, no hard-coded hex in CSS)
      const PALETTE = ["#fb923c", "#60a5fa", "#34d399", "#f472b6", "#a78bfa", "#facc15"];

      // ===========================
      // HELPERS
      // ===========================
      function setStatus(text) {
        statusPill.textContent = text;
      }

      function fmtNumber(x) {
        if (x == null || Number.isNaN(x)) return "—";
        return x.toLocaleString("en-US");
      }

      function fmtCentsOrNull(x) {
        if (x == null || Number.isNaN(x)) return "—";
        return `${Math.round(x)}¢`;
      }

      function setDebug(obj) {
        if (!DEBUG) return;
        debugBox.style.display = "block";
        debugBox.textContent = JSON.stringify(obj, null, 2);
      }

      async function fetchJSON(url) {
        const res = await fetch(url, { headers: { accept: "application/json" } });
        if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
        return res.json();
      }

      function isProbablyEventTicker(ticker) {
        // Kalshi event tickers often start with KX and include hyphen-number suffix
        // e.g., KXFEDCHAIRNOM-29
        // Markets often include additional contract segment, e.g., KXBTC-24DEC31
        return /^KX[A-Z0-9]+-[0-9]+$/.test(ticker);
      }

      function isProbablyMarketTicker(ticker) {
        return /^KX[A-Z0-9]+-/.test(ticker) && !isProbablyEventTicker(ticker);
      }

      function rangeToWindow(range) {
        const now = Math.floor(Date.now() / 1000);
        if (range === "1d") {
          const start = now - 60 * 60 * 24;
          return { start, end: now, interval: 60 };
        }
        if (range === "7d") {
          const start = now - 60 * 60 * 24 * 7;
          return { start, end: now, interval: 240 };
        }
        // default 1d
        const start = now - 60 * 60 * 24;
        return { start, end: now, interval: 60 };
      }

      function hardDestroyChart() {
        if (chart) {
          chart.destroy();
          chart = null;
        }
      }

      function sortMarkets(markets, mode) {
        const arr = [...markets];
        if (mode === "yes_bid_asc") {
          arr.sort((a, b) => (a.yes_bid ?? -1) - (b.yes_bid ?? -1));
        } else if (mode === "volume_desc") {
          arr.sort((a, b) => (b.volume ?? 0) - (a.volume ?? 0));
        } else {
          arr.sort((a, b) => (b.yes_bid ?? -1) - (a.yes_bid ?? -1));
        }
        return arr;
      }

      function clearUI() {
        errEl.textContent = "";
        debugBox.style.display = "none";
        debugBox.textContent = "";
        gridEl.style.display = "none";
        metaEl.textContent = "";
        listWrap.style.display = "none";
        marketsTbody.innerHTML = "";
        lastEventMarkets = [];

        // ✅ Keep title generic always
        titleEl.textContent = "Enter a market ticker or event ticker";

        questionEl.style.display = "none";
        questionEl.textContent = "";

        statsBar.style.display = "none";
        legendRow.style.display = "none";
        legendRow.innerHTML = "";
        tickerToName.clear();

        chartWrap.style.display = "none";
        chartMeta.textContent = "";
        activeEventTicker = null;
        activeEventSection = null;
        activeMarketTickersForChart = null;

        activeMode = null;
        activeMarketTicker = null;

        tileLiq.style.display = "none";
        tileMarket.style.display = "none";
        tileMarket.textContent = "";
        tileLiq.textContent = "";
      }

      // ===========================
      // MARKET DETAIL UI
      // ===========================
      const gridEl = document.createElement("div");
      gridEl.style.display = "none";
      gridEl.style.marginTop = "12px";
      gridEl.style.display = "grid";
      gridEl.style.gridTemplateColumns = "1fr 1fr";
      gridEl.style.gap = "12px";

      const tileMarket = document.createElement("div");
      tileMarket.className = "statTile";
      tileMarket.style.display = "none";

      const tileLiq = document.createElement("div");
      tileLiq.className = "statTile";
      tileLiq.style.display = "none";

      gridEl.appendChild(tileMarket);
      gridEl.appendChild(tileLiq);
      document.querySelector(".card").appendChild(gridEl);

      // ===========================
      // DATA FETCH
      // ===========================
      async function fetchMarket(marketTicker) {
        const url = `${BASE}/markets/${encodeURIComponent(marketTicker)}`;
        const payload = await fetchJSON(url);
        setDebug(payload);
        return payload.market ?? payload;
      }

      async function fetchMarketsByEvent(eventTicker) {
        const url = `${BASE}/markets?event_ticker=${encodeURIComponent(eventTicker)}&limit=200`;
        const payload = await fetchJSON(url);
        setDebug(payload);
        return payload.markets ?? [];
      }

      async function fetchCandlesForMarketTickers(tickers) {
        const { start, end, interval } = rangeToWindow(activeRange);
        const url =
          `${BASE}/markets/candlesticks` +
          `?market_tickers=${encodeURIComponent(tickers.join(","))}` +
          `&start_ts=${start}&end_ts=${end}&period_interval=${interval}` +
          `&include_latest_before_start=true`;
        const payload = await fetchJSON(url);
        setDebug(payload);
        return payload.markets ?? [];
      }

      // ===========================
      // LIST RENDER
      // ===========================
      function renderMarketsList(markets) {
        listWrap.style.display = "block";
        // ✅ Use event section label like "Politics · Trump" when available
        listTitle.textContent = activeEventSection || "Markets";
        countTag.textContent = `${markets.length} markets`;

        const sorted = sortMarkets(markets, sortSelect.value);
        marketsTbody.innerHTML = "";

        for (const mk of sorted) {
          const tr = document.createElement("tr");
          tr.className = "clickable";
          tr.addEventListener("click", () => {
            const newUrl = new URL(location.href);
            newUrl.searchParams.delete("event");
            newUrl.searchParams.set("ticker", mk.ticker);
            history.replaceState({}, "", newUrl);

            inputBox.value = (mk.ticker || "").toUpperCase();
            loadMarket(inputBox.value);
          });

          const yes = `${fmtCentsOrNull(mk.yes_bid)} / ${fmtCentsOrNull(mk.yes_ask)}`;
          const no = `${fmtCentsOrNull(mk.no_bid)} / ${fmtCentsOrNull(mk.no_ask)}`;

          tr.innerHTML = `
            <td>${mk.title || mk.name || "—"}</td>
            <td>${yes}</td>
            <td>${no}</td>
            <td>${fmtNumber(mk.volume)}</td>
            <td><span class="badge">${mk.ticker || "—"}</span></td>
          `;
          marketsTbody.appendChild(tr);
        }
      }

      // ===========================
      // CHART RENDER
      // ===========================
      function makeLegend(items) {
        legendRow.innerHTML = "";
        for (const it of items) {
          const div = document.createElement("span");
          div.className = "legendItem";
          div.innerHTML = `<span class="dot" style="background:${it.color}"></span>${it.label}`;
          legendRow.appendChild(div);
        }
        legendRow.style.display = "flex";
      }

      function buildDatasetsFromCandles(marketsCandles) {
        // marketsCandles: [{market_ticker, candlesticks:[{start_ts, yes_close, ...}]}]
        const datasets = [];
        const legendItems = [];

        marketsCandles.forEach((mc, idx) => {
          const ticker = mc.market_ticker;
          const c = PALETTE[idx % PALETTE.length];
          const label = tickerToName.get(ticker) || ticker;

          legendItems.push({ label, color: c });

          const points = (mc.candlesticks || []).map((k) => ({
            x: k.start_ts * 1000,
            y: (k.yes_close ?? k.yes_last ?? k.yes_open ?? null) / 100.0,
          }));

          datasets.push({
            label,
            data: points,
            borderColor: c,
            backgroundColor: c,
            pointRadius: 0,
            tension: 0.25,
            borderWidth: 2,
          });
        });

        return { datasets, legendItems };
      }

      function renderChart(marketsCandles, rangeLabel) {
        const { datasets, legendItems } = buildDatasetsFromCandles(marketsCandles);

        chartWrap.style.display = "block";
        makeLegend(legendItems);

        const ctx = chartCanvas.getContext("2d");
        hardDestroyChart();

        chart = new Chart(ctx, {
          type: "line",
          data: { datasets },
          options: {
            animation: false,
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: (ctx) => {
                    const v = ctx.parsed.y;
                    if (v == null) return `${ctx.dataset.label}: —`;
                    return `${ctx.dataset.label}: ${(v * 100).toFixed(1)}%`;
                  },
                },
              },
            },
            scales: {
              x: {
                type: "time",
                time: { unit: "hour" },
                ticks: { color: "rgba(255,255,255,.7)" },
                grid: { color: "rgba(255,255,255,.08)" },
              },
              y: {
                min: 0,
                max: 1,
                ticks: {
                  color: "rgba(255,255,255,.7)",
                  callback: (v) => `${Math.round(v * 100)}%`,
                },
                grid: { color: "rgba(255,255,255,.08)" },
              },
            },
          },
        });

        chartMeta.textContent = rangeLabel;
      }

      // ===========================
      // EVENT INFO (title + section)
      // ===========================
      function pickFirstString(obj, keys) {
        for (const k of keys) {
          const v = obj?.[k];
          if (typeof v === "string" && v.trim()) return v.trim();
        }
        return null;
      }

      function buildEventSection(ev) {
        // Try common shapes Kalshi APIs use (varies by endpoint/version)
        const category =
          pickFirstString(ev, ["category_title", "category", "category_name"]) ||
          pickFirstString(ev?.category, ["title", "name"]) ||
          (Array.isArray(ev?.categories)
            ? pickFirstString(ev.categories[0], ["title", "name"])
            : null);

        const topic =
          pickFirstString(ev, [
            "series_title",
            "series",
            "topic",
            "subcategory_title",
            "subtitle",
          ]) ||
          pickFirstString(ev?.series, ["title", "name"]) ||
          (Array.isArray(ev?.tags)
            ? typeof ev.tags[0] === "string"
              ? ev.tags[0]
              : pickFirstString(ev.tags[0], ["title", "name"])
            : null);

        if (category && topic) return `${category} · ${topic}`;
        if (category) return category;
        if (topic) return topic;
        return null;
      }

      async function fetchEventInfo(eventTicker) {
        try {
          const url = `${BASE}/events/${encodeURIComponent(eventTicker)}`;
          const payload = await fetchJSON(url);
          if (DEBUG) setDebug(payload);

          const ev = payload.event ?? payload;

          const title = pickFirstString(ev, ["title", "name", "question"]) || null;
          const section = buildEventSection(ev);

          return { title, section };
        } catch (_) {
          return { title: null, section: null };
        }
      }

      async function loadChartForMarketTickers(tickers) {
        if (!Array.isArray(tickers) || tickers.length === 0) return;

        hardDestroyChart();
        const { start, end, interval } = rangeToWindow(activeRange);

        const url =
          `${BASE}/markets/candlesticks` +
          `?market_tickers=${encodeURIComponent(tickers.join(","))}` +
          `&start_ts=${start}&end_ts=${end}&period_interval=${interval}` +
          `&include_latest_before_start=true`;

        const payload = await fetchJSON(url);
        if (DEBUG) setDebug(payload);

        const markets = payload.markets || [];
        if (!Array.isArray(markets) || markets.length === 0) {
          throw new Error("No candlestick data returned for chart range.");
        }

        const rangeLabel = `Range: ${activeRange.toUpperCase()} · Interval: ${interval}m · Markets: ${tickers
          .map((t) => tickerToName.get(t) || t)
          .join(", ")}`;

        renderChart(markets, rangeLabel);
      }

      // ===========================
      // LOADERS
      // ===========================
      async function loadMarket(marketTickerRaw) {
        const marketTicker = (marketTickerRaw || "").trim().toUpperCase();
        clearUI();
        statusEl.textContent = "Loading market…";

        try {
          activeMode = "market";
          activeMarketTicker = marketTicker;

          const mk = await fetchMarket(marketTicker);

          const title = mk.title || mk.name || marketTicker;
          titleEl.textContent = title;
          metaEl.textContent = `Showing market: ${marketTicker}`;

          // Basic tiles
          gridEl.style.display = "grid";
          tileMarket.style.display = "block";
          tileLiq.style.display = "block";
          tileMarket.innerHTML = `<div class="statLabel">MARKET</div><div class="statValue" style="font-size:18px;margin-top:8px">${title}</div>`;
          tileLiq.innerHTML = `<div class="statLabel">LIQUIDITY</div><div class="statValue">${fmtNumber(mk.liquidity)}</div>`;

          // Stats bar
          statsBar.style.display = "grid";
          vol24hEl.textContent = fmtNumber(mk.volume_24h);
          openIntEl.textContent = fmtNumber(mk.open_interest);

          // Set name for legend
          tickerToName.set(marketTicker, title);

          // Chart single market
          activeMarketTickersForChart = [marketTicker];
          await loadChartForMarketTickers([marketTicker]);

          setStatus("Loaded");
          statusEl.textContent = "Loaded";
        } catch (e) {
          errEl.textContent = e.message || String(e);
          setStatus("Error");
          statusEl.textContent = "Error";
        }
      }

      async function loadEvent(eventTickerRaw) {
        const eventTicker = (eventTickerRaw || "").trim().toUpperCase();
        clearUI();
        statusEl.textContent = "Loading event markets…";

        try {
          activeMode = "event";
          activeEventTicker = eventTicker;

          const info = await fetchEventInfo(eventTicker);

          activeEventSection = info.section; // e.g., "Politics · Trump"
          questionEl.textContent = info.title || "Event question unavailable";
          questionEl.style.display = "block";

          const url = `${BASE}/markets?event_ticker=${encodeURIComponent(eventTicker)}&limit=200`;
          const payload = await fetchJSON(url);
          setDebug(payload);

          const markets = payload.markets ?? [];
          if (!Array.isArray(markets) || markets.length === 0) {
            throw new Error("No markets found for that event ticker (or event ticker is wrong).");
          }

          metaEl.textContent = `Showing ${markets.length} markets for event ticker: ${eventTicker}`;

          // Populate tickerToName for legend
          markets.forEach((m) => {
            if (m?.ticker) tickerToName.set(m.ticker, m.title || m.name || m.ticker);
          });

          lastEventMarkets = markets;
          renderMarketsList(markets);

          // Stats: sum volume_24h and open_interest across event markets (approx)
          const vol24h = markets.reduce((acc, m) => acc + (m.volume_24h ?? 0), 0);
          const openInt = markets.reduce((acc, m) => acc + (m.open_interest ?? 0), 0);

          statsBar.style.display = "grid";
          vol24hEl.textContent = fmtNumber(vol24h);
          openIntEl.textContent = fmtNumber(openInt);

          // Chart: top 3 by YES bid by default
          const top = sortMarkets(markets, "yes_bid_desc").slice(0, 3);
          const tickers = top.map((m) => m.ticker).filter(Boolean);
          activeMarketTickersForChart = tickers;

          await loadChartForMarketTickers(tickers);

          setStatus("Loaded");
          statusEl.textContent = "Loaded";
        } catch (e) {
          errEl.textContent = e.message || String(e);
          setStatus("Error");
          statusEl.textContent = "Error";
        }
      }

      // ===========================
      // USER ACTIONS
      // ===========================
      async function loadFromInput() {
        const raw = inputBox.value || "";
        const t = raw.trim().toUpperCase();
        if (!t) return;

        setStatus("Loading…");
        statusEl.textContent = "Loading…";

        // Guess type
        if (isProbablyEventTicker(t)) return loadEvent(t);
        if (isProbablyMarketTicker(t)) return loadMarket(t);

        // If unsure, try event first then market
        try {
          await loadEvent(t);
        } catch (_) {
          await loadMarket(t);
        }
      }

      loadBtn.addEventListener("click", loadFromInput);
      inputBox.addEventListener("keydown", (e) => {
        if (e.key === "Enter") loadFromInput();
      });

      sortSelect.addEventListener("change", () => {
        if (activeMode === "event" && Array.isArray(lastEventMarkets) && lastEventMarkets.length) {
          renderMarketsList(lastEventMarkets);
        }
      });

      // ===========================
      // INIT: read query params
      // ===========================
      (function init() {
        const u = new URL(location.href);
        const qp = (u.searchParams.get("ticker") || u.searchParams.get("event") || "").trim();
        if (qp) {
          inputBox.value = qp.toUpperCase();
          loadFromInput();
        } else {
          setStatus("Idle");
        }
      })();
    </script>
  </body>
</html>
